name: Deploy static site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # If GH_PAGES_TOKEN is provided, configure-pages can auto-enable Pages
          # on first run. Otherwise it falls back to github.token and expects
          # Pages to be enabled manually in repository settings.
          token: ${{ secrets.GH_PAGES_TOKEN != '' && secrets.GH_PAGES_TOKEN || github.token }}
          enablement: ${{ secrets.GH_PAGES_TOKEN != '' }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dls-ai-main

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
