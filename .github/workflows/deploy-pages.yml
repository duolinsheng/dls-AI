name: Deploy static site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    env:
      GH_PAGES_TOKEN: ${{ secrets.GH_PAGES_TOKEN }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Try to auto-enable Pages on first run.
          # Prefer GH_PAGES_TOKEN (PAT) when present, otherwise use github.token.
          token: ${{ env.GH_PAGES_TOKEN != '' && env.GH_PAGES_TOKEN || github.token }}
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dls-ai-main

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
